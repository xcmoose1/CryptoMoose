<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Analytics Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gradient-primary: linear-gradient(135deg, #6e8efb, #a777e3);
            --color-bg: #1a1a1a;
            --color-card: rgba(255, 255, 255, 0.05);
            --color-text: #ffffff;
            --color-text-secondary: #a0a0a0;
            --shadow-lg: 0 10px 20px rgba(0, 0, 0, 0.2);
            --border-radius: 12px;
        }

        body {
            background: var(--color-bg);
            color: var(--color-text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            margin-bottom: 2rem;
            padding: 1rem;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--color-text);
        }

        .moose-image {
            width: 40px;
            height: auto;
            margin-right: 1rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-link {
            color: var(--color-text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 500;
        }

        .nav-link:hover {
            color: var(--color-text);
        }

        .nav-link.active {
            color: var(--color-text);
            position: relative;
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gradient-primary);
            border-radius: 2px;
        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .glass {
            background: var(--color-card);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-lg);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: var(--border-radius);
            text-align: center;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 600;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }

        .metric-label {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .chart-container {
            width: 100%;
            height: 300px;
            margin-top: 1rem;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h2 i {
            color: #a777e3;
        }

        .topics-list, .influencers-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .topic-item, .influencer-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: var(--border-radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topic-mentions, .influencer-followers {
            background: var(--gradient-primary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="glass-header">
            <nav>
                <a href="index.html" class="logo">
                    <img src="images/Moose.png" alt="CryptoMoose" class="moose-image">
                    <span>CryptoMoose</span>
                </a>
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="learning.html" class="nav-link">Learning</a>
                    <a href="members.html" class="nav-link">Signals</a>
                    <a href="dashboard.html" class="nav-link">Dashboard</a>
                    <a href="x_analysis.html" class="nav-link active">Analysis</a>
                </div>
            </nav>
        </header>

        <main class="content">
            <section class="social-overview glass">
                <h2><i class="fas fa-chart-line"></i> Social Engagement Overview</h2>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <span class="metric-value" id="totalMentions">0</span>
                        <span class="metric-label">Total Mentions (24h)</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-value" id="totalEngagement">0</span>
                        <span class="metric-label">Total Engagement</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-value" id="overallSentiment">50%</span>
                        <span class="metric-label">Overall Sentiment</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-value" id="activeUsers">0</span>
                        <span class="metric-label">Active Users</span>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="mentionsChart"></canvas>
                </div>
            </section>

            <div class="grid-container">
                <section class="trending-topics glass">
                    <h2><i class="fas fa-fire"></i> Trending Topics</h2>
                    <div class="topics-list" id="trendingTopics">
                        <!-- Topics will be populated by JavaScript -->
                    </div>
                </section>

                <section class="token-mentions glass">
                    <h2><i class="fas fa-coins"></i> Token Mentions</h2>
                    <div class="chart-container">
                        <canvas id="tokenDistributionChart"></canvas>
                    </div>
                </section>

                <section class="top-influencers glass">
                    <h2><i class="fas fa-users"></i> Top Influencers</h2>
                    <div class="influencers-list" id="topInfluencers">
                        <!-- Influencers will be populated by JavaScript -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.0/dist/chart.min.js"></script>
    <script>
        // Initialize charts and data
        document.addEventListener('DOMContentLoaded', function() {
            // Sample data for trending topics
            const trendingTopics = [
                { name: '#Bitcoin', mentions: 1224 },
                { name: '#Ethereum', mentions: 890 },
                { name: '#NFTs', mentions: 567 },
                { name: '#DeFi', mentions: 432 },
                { name: '#Web3', mentions: 321 }
            ];

            // Sample data for top influencers
            const topInfluencers = [
                { name: '@cryptoanalyst', followers: '1.2M' },
                { name: '@tradingexpert', followers: '850K' },
                { name: '@cryptonews', followers: '720K' },
                { name: '@blockchain', followers: '500K' },
                { name: '@cryptotrader', followers: '450K' }
            ];

            // Populate trending topics
            const topicsContainer = document.getElementById('trendingTopics');
            trendingTopics.forEach(topic => {
                const topicElement = document.createElement('div');
                topicElement.className = 'topic-item';
                topicElement.innerHTML = `
                    <span>${topic.name}</span>
                    <span class="topic-mentions">${topic.mentions} mentions</span>
                `;
                topicsContainer.appendChild(topicElement);
            });

            // Populate top influencers
            const influencersContainer = document.getElementById('topInfluencers');
            topInfluencers.forEach(influencer => {
                const influencerElement = document.createElement('div');
                influencerElement.className = 'influencer-item';
                influencerElement.innerHTML = `
                    <span>${influencer.name}</span>
                    <span class="influencer-followers">${influencer.followers} followers</span>
                `;
                influencersContainer.appendChild(influencerElement);
            });

            // Initialize mentions chart
            const mentionsCtx = document.getElementById('mentionsChart').getContext('2d');
            new Chart(mentionsCtx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 24}, (_, i) => `${i}:00`),
                    datasets: [{
                        label: 'Mentions',
                        data: Array.from({length: 24}, () => Math.floor(Math.random() * 1000) + 500),
                        borderColor: '#6e8efb',
                        tension: 0.4,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });

            // Initialize token distribution chart
            const tokenCtx = document.getElementById('tokenDistributionChart').getContext('2d');
            new Chart(tokenCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Bitcoin', 'Ethereum', 'BNB', 'Dogecoin'],
                    datasets: [{
                        data: [40, 30, 20, 10],
                        backgroundColor: [
                            '#6e8efb',
                            '#a777e3',
                            '#ffd700',
                            '#ff6b6b'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right'
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
